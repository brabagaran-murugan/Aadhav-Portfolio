<!DOCTYPE html>
<html>
<head>
  <title>AADHAV</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 10% 20%, #1b2735 0, #090a0f 40%, #000000 100%);
      overflow: hidden;
      font-family: 'Press Start 2P', system-ui, sans-serif;
    }

    /* Moving pixel grid overlay */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(#1f2933 1px, transparent 1px),
        linear-gradient(90deg, #1f2933 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      animation: gridMove 12s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .content {
      position: relative;
      text-align: center;
      margin-top: 80px;
      color: #00eaff;
      text-shadow:
        0 0 8px #00eaff,
        0 0 16px #0077ff,
        0 0 32px #0044ff;
      animation: popIn 1s ease forwards;
      opacity: 0;
    }

    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.9rem;
      color: #c4f3ff;
    }

    /* Digital Clock Styles */
    .clock-container {
      margin-top: 2rem;
      animation: popIn 1s ease forwards 0.3s backwards;
    }

    .digital-time {
      text-align: center;
      color: #00eaff;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 
        0 0 10px #00eaff,
        0 0 20px #0077ff,
        0 0 30px #0044ff;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.2em;
    }

    .am-pm {
      color: #ff00ff;
      font-size: 1.5rem;
      text-shadow: 0 0 10px #ff00ff, 0 0 15px #ff0088;
      margin-left: 1rem;
    }
        /* Running Banner */
    .banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: linear-gradient(90deg, #ff006e, #00d9ff, #ffd60a, #ff006e);
      background-size: 200% 100%;
      animation: bannerGlow 3s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 0 20px #ff006e, 0 0 10px #00d9ff;
      overflow: hidden;
    }

    @keyframes bannerGlow {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .banner-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #000;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      animation: marquee 10s linear infinite;
      white-space: nowrap;
    }

    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="banner-text">★ Welcome to AADHAV's gaming world ★</div>
  </div>
  
  <div class="grid"></div>

  <div class="content">
    <h1>AADHAV</h1>
    <p>PLAYER 1 · LEVEL 100</p>

    <div class="clock-container">
      <div class="digital-time" id="digitalTime">00:00 <span class="am-pm">AM</span></div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const hoursStr = String(hours).padStart(2, '0');
      
      document.getElementById('digitalTime').innerHTML = `${hoursStr}:${minutes} <span class="am-pm">${ampm}</span>`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
