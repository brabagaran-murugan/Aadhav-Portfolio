<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Background</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(to right, #ff006e, #00d9ff, #ffd60a);
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .spikes {
            position: absolute;
            top: 80%;
            left: 0;
            width: 100%;
            height: 20px;
            background: url('spikes.png') repeat-x;
            animation: spike-animation 1s linear infinite;
        }

        @keyframes spike-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .rotating-square {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #ffd60a;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spikes"></div>
    <div class="rotating-square" style="top: 50px; left: 50px;"></div>
    <div class="rotating-square" style="top: 150px; left: 150px;"></div>
    <div class="rotating-square" style="top: 250px; left: 250px;"></div>
</body>
</html>
